# GitHub Pages 部署 workflow（campaign 展示層，選配）
# 裝法：
#   1. 複製本檔到目標 repo 的 .github/workflows/pages.yml
#   2. repo Settings → Pages → Source 選 "GitHub Actions"
#   3. campaign.py report 產出 docs/campaign-report.html；push 到下方
#      branches 列的分支即發佈（pages-setup 會自動改寫成安裝當下的分支；
#      實驗分支的 push 刻意不觸發部署）
# 紀律（呼應 MISSION GUARDRAILS）：進度頁每 job 誠實刷新（ledger 全表含
# not-significant rows、有徽章標示）；對外的「勝出宣稱」與 demo checkpoint
# 只在通過顯著性 gate 後更新。
name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # demo 音檔若走 Git LFS：只拉 docs/ 的物件——lfs:true 會 smudge 整個
      # 工作樹（含 LFS checkpoints/datasets），可能吃爆 runner 磁碟與流量
      - name: Fetch LFS objects for docs/ only
        # 無條件執行：非 LFS repo 是 no-op（exit 0）。不用 ls-files|grep -q 偵測
        # ——pipefail 下 grep -q 提早退出會 SIGPIPE 掉 ls-files（141），把有
        # LFS 的 repo 誤判成沒有，pointer 就上線了
        run: git lfs pull --include="docs/**"
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
